<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员卡片 - Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 20px; }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #45b7d1; }
        
        .debug-info { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-family: monospace; white-space: pre-wrap; }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .player-card { 
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .player-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(69, 183, 209, 0.5);
        }
        
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar-wrapper { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            background: linear-gradient(135deg, #45b7d1 0%, #2980b9 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .player-info { flex: 1; min-width: 0; }
        .player-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 2px; }
        .player-nickname { color: #fbbf24; font-style: italic; font-size: 0.9rem; }
        
        .player-number { 
            background: rgba(69, 183, 209, 0.2); 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.9rem;
            color: #45b7d1;
        }
        
        .player-details { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .detail-label { color: #94a3b8; }
        .detail-value { color: #fff; font-weight: 500; }
        
        .team-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .team-badge { 
            background: rgba(255,255,255,0.1); 
            padding: 3px 8px; 
            border-radius: 3px; 
            font-size: 0.75rem; 
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀 NBA球员卡片</h1>
        </div>
        
        <div class="debug-info" id="debugInfo">正在加载...</div>
        
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <script>
        const debugInfo = document.getElementById('debugInfo');
        const cardsGrid = document.getElementById('cardsGrid');
        
        function log(message) {
            console.log(message);
            debugInfo.textContent += message + '\n';
        }
        
        async function loadPlayers() {
            try {
                log('1. 开始加载球员数据...');
                
                const response = await fetch('/api/player-cards?limit=100');
                log(`2. 获取响应，状态: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status}`);
                }
                
                const data = await response.json();
                log(`3. JSON解析完成, success: ${data.success}, count: ${data.count || 0}`);
                
                if (!data.success) {
                    throw new Error('API返回success=false');
                }
                
                if (!Array.isArray(data.players)) {
                    throw new Error('players不是数组');
                }
                
                log(`4. 开始渲染 ${data.players.length} 个球员...`);
                
                cardsGrid.innerHTML = data.players.map(player => {
                    try {
                        return createCard(player);
                    } catch (e) {
                        log(`渲染球员 ${player.name} 失败: ${e.message}`);
                        return '';
                    }
                }).join('');
                
                log(`5. 渲染完成!`);
                
            } catch (e) {
                log(`错误: ${e.message}`);
                console.error(e);
            }
        }
        
        function createCard(player) {
            const height = player.height || (player.physical_info?.height || '');
            const weight = player.weight || (player.physical_info?.weight || '');
            
            // 安全处理career_teams
            let teams = [];
            if (player.career_teams) {
                if (Array.isArray(player.career_teams)) {
                    teams = player.career_teams.slice(0, 3);
                } else if (typeof player.career_teams === 'object') {
                    teams = Object.values(player.career_teams).slice(0, 3);
                }
            }
            
            return `
                <div class="player-card">
                    <div class="card-header">
                        <div class="avatar-wrapper">
                            ${player.avatar_url ? `<img src="${player.avatar_url}" alt="${player.name}" onerror="this.parentElement.innerHTML='${player.name.charAt(0)}'">` : player.name.charAt(0)}
                        </div>
                        <div class="player-info">
                            <div class="player-name">${player.name || '未知'}</div>
                            ${player.nickname ? `<div class="player-nickname">"${player.nickname}"</div>` : ''}
                        </div>
                        ${player.primary_number ? `<div class="player-number">#${player.primary_number}</div>` : ''}
                    </div>
                    
                    <div class="player-details">
                        <div class="detail-row">
                            <span class="detail-label">位置</span>
                            <span class="detail-value">${player.position || 'N/A'}</span>
                        </div>
                        ${height ? `<div class="detail-row">
                            <span class="detail-label">身高</span>
                            <span class="detail-value">${height}</span>
                        </div>` : ''}
                        ${weight ? `<div class="detail-row">
                            <span class="detail-label">体重</span>
                            <span class="detail-value">${weight}</span>
                        </div>` : ''}
                        ${player.college ? `<div class="detail-row">
                            <span class="detail-label">大学</span>
                            <span class="detail-value">${player.college}</span>
                        </div>` : ''}
                    </div>
                    
                    ${teams.length > 0 ? `<div class="team-badges">
                        ${teams.map(team => `<span class="team-badge">${team}</span>`).join('')}
                    </div>` : ''}
                </div>
            `;
        }
        
        loadPlayers();
    </script>
</body>
</html>
