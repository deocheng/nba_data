<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员数据中心</title>
    <link rel="stylesheet" href="/static/styles/variables.css">
    <link rel="stylesheet" href="/static/styles/common.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .player-btn {
            padding: 12px 24px;
            border: 2px solid #3b82f6;
            background: transparent;
            color: #3b82f6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .player-btn:hover {
            background: #3b82f6;
            color: #fff;
            transform: translateY(-2px);
        }

        .player-btn.active {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .content {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-card .label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            display: block;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .stat-card .unit {
            font-size: 14px;
            color: #666;
        }

        .stat-card.highlight {
            background: linear-gradient(145deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1));
            border-color: rgba(59, 130, 246, 0.3);
        }

        .stat-card.highlight .value {
            color: #3b82f6;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .section-title {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .chart-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .chart-container canvas {
            width: 100% !important;
            height: 300px !important;
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-table th,
        .stats-table td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-table th {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stats-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .stats-table tbody tr td:first-child {
            text-align: left;
            color: #fff;
        }

        .stats-table tbody tr td:not(:first-child) {
            color: #ccc;
        }

        .stats-table .highlight-value {
            color: #3b82f6;
            font-weight: 600;
        }

        .shot-chart-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .heatmap-container {
            background: #fff !important;
            max-width: 600px;
            width: 100%;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            
            .stat-card .value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-basketball-ball" style="color: #fdb927;"></i> NBA球员数据中心</h1>
        <div class="player-selector">
            <button class="player-btn active" data-player="victor_wembanyama">维克托·文班亚马</button>
            <button class="player-btn" data-player="devin_vassell">德文·瓦塞尔</button>
            <button class="player-btn" data-player="keldon_johnson">凯尔登·约翰逊</button>
            <button class="player-btn" data-player="chet_holmgren">切特·霍姆格伦</button>
            <button class="player-btn" data-player="dylan_harper">迪伦·哈珀</button>
            <button class="player-btn" data-player="stephon_castle">斯蒂芬·卡斯尔</button>
        </div>
    </div>

    <div class="content">
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card highlight">
                <span class="label">场均得分</span>
                <span class="value">0<span class="unit"> PTS</span></span>
            </div>
            <div class="stat-card">
                <span class="label">场均篮板</span>
                <span class="value">0<span class="unit"> REB</span></span>
            </div>
            <div class="stat-card">
                <span class="label">场均助攻</span>
                <span class="value">0<span class="unit"> AST</span></span>
            </div>
            <div class="stat-card">
                <span class="label">场均盖帽</span>
                <span class="value">0<span class="unit"> BLK</span></span>
            </div>
            <div class="stat-card">
                <span class="label">投篮命中率</span>
                <span class="value">0<span class="unit"> %</span></span>
            </div>
            <div class="stat-card">
                <span class="label">三分命中率</span>
                <span class="value">0<span class="unit"> %</span></span>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title"><i class="fas fa-chart-line"></i> 赛季数据统计</h2>
            <table class="stats-table" id="stats-table">
                <thead>
                    <tr>
                        <th>赛季</th>
                        <th>场次</th>
                        <th>首发</th>
                        <th>分钟</th>
                        <th>得分</th>
                        <th>篮板</th>
                        <th>助攻</th>
                        <th>抢断</th>
                        <th>盖帽</th>
                        <th>命中率</th>
                        <th>三分率</th>
                        <th>罚球率</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="12" style="text-align:center;color:#888;">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section">
            <h2 class="section-title"><i class="fas fa-chart-pie"></i> 数据可视化</h2>
            <div class="charts-row">
                <div class="chart-container">
                    <canvas id="radar-chart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="line-chart"></canvas>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title"><i class="fas fa-thermometer-half"></i> 投篮热区</h2>
            <div class="shot-chart-wrapper">
                <div id="heatmap-container"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>NBA球员数据中心 © 2024 | 数据仅供参考</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/static/modules/shooting-heatmap.js"></script>
    <script>
        // 球员ID映射
        const playerIdMap = {
            'victor_wembanyama': 'wembanyama',
            'devin_vassell': 'vassell',
            'keldon_johnson': 'johnson',
            'chet_holmgren': 'holmgren',
            'dylan_harper': 'harper',
            'stephon_castle': 'castle'
        };
        
        let currentPlayer = 'victor_wembanyama';
        let radarChart = null;
        let lineChart = null;

        // 从API获取球员完整数据
        async function fetchPlayerData(playerKey) {
            try {
                const playerId = playerIdMap[playerKey] || playerKey;
                
                // 获取球员基本资料
                const profileResponse = await fetch(`/api/player/${playerId}/profile`);
                const profileData = await profileResponse.json();
                
                // 获取最近10场比赛
                const recentResponse = await fetch(`/api/player/${playerId}/recent_games?limit=10`);
                const recentData = await recentResponse.json();
                
                return {
                    profile: profileData.success ? profileData.data : null,
                    recentGames: recentData.success ? recentData.data : []
                };
            } catch (error) {
                console.error('获取球员数据失败:', error);
                return null;
            }
        }

        // 计算投篮命中率数据
        function calculateShootingStats(profile) {
            if (!profile || !profile.career_averages) {
                return { close: 65, mid: 45, long: 38, three: 35, ft: 78 };
            }
            
            const avg = profile.career_averages;
            return {
                close: Math.min(75, Math.round(avg.fg_pct + 10)),
                mid: Math.round(avg.fg_pct - 5),
                long: Math.round(avg.fg_pct - 10),
                three: avg.three_pct,
                ft: avg.ft_pct
            };
        }

        async function updatePlayer(playerKey) {
            currentPlayer = playerKey;
            
            document.querySelectorAll('.player-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-player="${playerKey}"]`).classList.add('active');
            
            // 获取真实数据
            const playerData = await fetchPlayerData(playerKey);
            
            if (playerData && playerData.profile) {
                const { profile, recentGames } = playerData;
                
                // 更新统计卡片
                updateStatsCards(profile.career_averages);
                
                // 更新赛季表格
                updateSeasonTable(profile.seasons);
                
                // 计算投篮数据
                const shootingStats = calculateShootingStats(profile);
                
                // 更新图表
                updateCharts(shootingStats, recentGames, profile);
                
                // 更新热图
                updateHeatmap(playerIdMap[playerKey] || playerKey);
            } else {
                // 如果API获取失败，使用备用数据
                console.log('使用备用数据');
                useFallbackData(playerKey);
            }
        }

        function useFallbackData(playerKey) {
            const fallbackData = {

                    ],

                    stats: {
                        avg_points: 21.8, avg_rebounds: 4.5, avg_assists: 3.2, avg_blocks: 0.8,
                        fg_pct: 47.5, three_pct: 43.2, ft_pct: 85.6
                    },
                    seasons: [
                        { season_id: '2020-21', games: 62, games_started: 17, avg_minutes: 17.0, avg_points: 5.5, avg_rebounds: 1.8, avg_assists: 0.9, avg_steals: 0.4, avg_blocks: 0.3, fg_pct: 40.6, three_pct: 34.7, ft_pct: 72.5 },
                        { season_id: '2023-24', games: 76, games_started: 76, avg_minutes: 34.5, avg_points: 19.3, avg_rebounds: 3.9, avg_assists: 3.0, avg_steals: 1.1, avg_blocks: 0.6, fg_pct: 46.1, three_pct: 41.0, ft_pct: 82.1 },
                        { season_id: '2024-25', games: 78, games_started: 78, avg_minutes: 36.2, avg_points: 21.8, avg_rebounds: 4.5, avg_assists: 3.2, avg_steals: 1.2, avg_blocks: 0.8, fg_pct: 47.5, three_pct: 43.2, ft_pct: 85.6 }
                    ],

                },

                    stats: {

                    },

                        { season_id: '2024-25', games: 72, games_started: 72, avg_minutes: 33.5, avg_points: 22.1, avg_rebounds: 9.8, avg_assists: 3.1, avg_steals: 1.0, avg_blocks: 3.2, fg_pct: 51.8, three_pct: 36.5, ft_pct: 79.2 }
                    ],
                    shooting: { close: 70, mid: 45, long: 40, three: 37, ft: 79 },
                    recentGames: [22, 25, 19, 27, 23, 24, 21, 26, 28, 22]
                },
                'dylan_harper': {
                    name: '迪伦·哈珀',
                    stats: {
                        avg_points: 14.5, avg_rebounds: 3.8, avg_assists: 4.2, avg_blocks: 0.3,
                        fg_pct: 44.6, three_pct: 37.2, ft_pct: 82.1
                    },
                    seasons: [
                        { season_id: '2024-25', games: 68, games_started: 52, avg_minutes: 28.5, avg_points: 12.3, avg_rebounds: 3.2, avg_assists: 3.5, avg_steals: 1.2, avg_blocks: 0.2, fg_pct: 42.1, three_pct: 34.5, ft_pct: 79.8 },
                        { season_id: '2025-26', games: 72, games_started: 72, avg_minutes: 31.8, avg_points: 14.5, avg_rebounds: 3.8, avg_assists: 4.2, avg_steals: 1.3, avg_blocks: 0.3, fg_pct: 44.6, three_pct: 37.2, ft_pct: 82.1 }
                    ],
                    shooting: { close: 58, mid: 42, long: 38, three: 37, ft: 82 },
                    recentGames: [14, 16, 12, 15, 13, 17, 14, 18, 16, 15]
                },
                'stephon_castle': {
                    name: '斯蒂芬·卡斯尔',
                    stats: {
                        avg_points: 11.2, avg_rebounds: 4.5, avg_assists: 5.1, avg_blocks: 0.6,
                        fg_pct: 46.8, three_pct: 32.8, ft_pct: 77.5
                    },
                    seasons: [
                        { season_id: '2024-25', games: 70, games_started: 45, avg_minutes: 26.2, avg_points: 9.5, avg_rebounds: 3.8, avg_assists: 4.2, avg_steals: 1.1, avg_blocks: 0.4, fg_pct: 44.2, three_pct: 30.1, ft_pct: 74.2 },
                        { season_id: '2025-26', games: 74, games_started: 74, avg_minutes: 29.8, avg_points: 11.2, avg_rebounds: 4.5, avg_assists: 5.1, avg_steals: 1.3, avg_blocks: 0.6, fg_pct: 46.8, three_pct: 32.8, ft_pct: 77.5 }
                    ],
                    shooting: { close: 55, mid: 40, long: 35, three: 33, ft: 78 },
                    recentGames: [11, 13, 9, 12, 10, 14, 11, 12, 13, 10]
                }
            };
            
            const data = fallbackData[playerKey];
            if (data) {
                updateStatsCards(data.stats);
                updateSeasonTable(data.seasons);
                updateCharts(data.shooting, data.recentGames.map((pts, i) => ({ points: pts })), { radar_data: { datasets: [{ actualValues: [data.stats.avg_points, data.stats.avg_rebounds, data.stats.avg_assists, data.stats.avg_blocks, data.stats.fg_pct, data.stats.three_pct, data.stats.ft_pct] }] } });
                updateHeatmap(playerKey);
            }
        }

        function updateStatsCards(stats) {
            const cards = document.querySelectorAll('.stat-card');
            const values = [
                stats.avg_points || stats.pts || 0,
                stats.avg_rebounds || stats.reb || 0,
                stats.avg_assists || stats.ast || 0,
                stats.avg_blocks || stats.blk || 0,
                stats.fg_pct || 0,
                stats.three_pct || stats.fg3_pct || 0
            ];
            const units = [' PTS', ' REB', ' AST', ' BLK', ' %', ' %'];
            
            cards.forEach((card, i) => {
                const val = values[i] !== undefined ? values[i] : 0;
                card.querySelector('.value').innerHTML = (typeof val === 'number' ? val.toFixed(1) : val) + '<span class="unit">' + units[i] + '</span>';
            });
        }

        function updateSeasonTable(seasons) {
            const tbody = document.querySelector('#stats-table tbody');
            if (!seasons || seasons.length === 0) {
                tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:#888;">暂无赛季数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = seasons.map(s => {
                // 适配不同的数据格式
                const seasonId = s.season_id || s.season;
                const games = s.games || s.gp;
                const starts = s.games_started || s.gs;
                const minutes = s.avg_minutes || s.mp;
                const points = s.avg_points || s.pts;
                const rebounds = s.avg_rebounds || s.reb;
                const assists = s.avg_assists || s.ast;
                const steals = s.avg_steals || s.stl;
                const blocks = s.avg_blocks || s.blk;
                const fgPct = s.fg_pct;
                const threePct = s.three_pct || s.fg3_pct;
                const ftPct = s.ft_pct;
                
                return `
                <tr>
                    <td>${seasonId || '-'}</td>
                    <td>${games || '-'}</td>
                    <td>${starts || '-'}</td>
                    <td>${minutes !== undefined ? (typeof minutes === 'number' ? minutes.toFixed(1) : minutes) : '-'}</td>
                    <td class="highlight-value">${points !== undefined ? (typeof points === 'number' ? points.toFixed(1) : points) : '-'}</td>
                    <td>${rebounds !== undefined ? (typeof rebounds === 'number' ? rebounds.toFixed(1) : rebounds) : '-'}</td>
                    <td>${assists !== undefined ? (typeof assists === 'number' ? assists.toFixed(1) : assists) : '-'}</td>
                    <td>${steals !== undefined ? (typeof steals === 'number' ? steals.toFixed(1) : steals) : '-'}</td>
                    <td>${blocks !== undefined ? (typeof blocks === 'number' ? blocks.toFixed(1) : blocks) : '-'}</td>
                    <td>${fgPct !== undefined ? (typeof fgPct === 'number' ? fgPct.toFixed(1) : fgPct) + '%' : '-'}</td>
                    <td>${threePct !== undefined ? (typeof threePct === 'number' ? threePct.toFixed(1) : threePct) + '%' : '-'}</td>
                    <td>${ftPct !== undefined ? (typeof ftPct === 'number' ? ftPct.toFixed(1) : ftPct) + '%' : '-'}</td>
                </tr>
            `;
            }).join('');
        }

        function updateCharts(shootingData, recentGames, profile) {
            if (radarChart) radarChart.destroy();
            if (lineChart) lineChart.destroy();

            const radarCtx = document.getElementById('radar-chart').getContext('2d');
            
            let radarData;
            if (profile && profile.radar_data) {
                // 使用API返回的雷达数据
                radarData = profile.radar_data.datasets[0].actualValues;
            } else {
                // 使用备用数据
                radarData = [shootingData.close, shootingData.mid, shootingData.long, shootingData.three, shootingData.ft, 60];
            }
            
            radarChart = new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['得分能力', '篮板能力', '助攻能力', '防守能力', '投篮效率', '三分能力', '罚球能力'],
                    datasets: [{
                        label: '球员能力',
                        data: radarData,
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(59, 130, 246, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { display: false },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff', font: { size: 11 } }
                        }
                    },
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#fff' }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `能力值: ${context.raw}`;
                                }
                            }
                        }
                    }
                }
            });

            const lineCtx = document.getElementById('line-chart').getContext('2d');
            const recentPoints = recentGames.map(g => g.points);
            const gameLabels = recentGames.map((g, i) => `G${i + 1}`);
            
            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: gameLabels,
                    datasets: [{
                        label: '近10场得分',
                        data: recentPoints,
                        borderColor: 'rgba(34, 197, 94, 1)',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: 'rgba(34, 197, 94, 1)',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    scales: {
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            beginAtZero: false,
                            min: recentPoints.length > 0 ? Math.max(0, Math.min(...recentPoints) - 5) : 0
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff' }
                        }
                    }
                }
            });
        }

        function updateHeatmap(playerKey) {
            const container = document.getElementById('heatmap-container');
            container.innerHTML = '';
            ShootingHeatmap.init('heatmap-container', playerKey);
        }

        document.addEventListener('DOMContentLoaded', function() {
            updatePlayer('victor_wembanyama');

            document.querySelectorAll('.player-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    updatePlayer(this.dataset.player);
                });
            });
        });
    </script>
</body>
</html>
