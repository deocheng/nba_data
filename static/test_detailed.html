<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>详细测试 - 找出崩溃原因</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .log { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 5px; font-size: 12px; max-height: 700px; overflow-y: auto; border: 1px solid #333; }
        .error { color: #ff6b6b; font-weight: bold; }
        .success { color: #4ecdc4; }
        .info { color: #45b7d1; }
        .warning { color: #fbbf24; }
        .btn { padding: 10px 20px; background: #45b7d1; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .stats { display: flex; gap: 20px; margin: 10px 0; }
        .stat { background: #16213e; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>详细测试 - 找出崩溃原因</h1>
    <button class="btn" onclick="startTest()">开始测试</button>
    <button class="btn" onclick="clearLog()">清空日志</button>
    
    <div class="stats">
        <div class="stat">总球员: <span id="total" class="success">0</span></div>
        <div class="stat">成功渲染: <span id="success" class="success">0</span></div>
        <div class="stat">渲染失败: <span id="failed" class="error">0</span></div>
        <div class="stat">加载失败: <span id="loadFailed" class="error">0</span></div>
    </div>
    
    <div class="log" id="log"></div>

    <script>
        let successCount = 0;
        let failedCount = 0;
        let loadFailedCount = 0;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const colors = { 
                error: '#ff6b6b', 
                success: '#4ecdc4', 
                info: '#45b7d1',
                warning: '#fbbf24'
            };
            const types = {
                error: '[错误]',
                success: '[成功]',
                info: '[信息]',
                warning: '[警告]'
            };
            logDiv.innerHTML += `<p style="color: ${colors[type]};">${types[type]} ${message}</p>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStats() {
            document.getElementById('total').textContent = successCount + failedCount;
            document.getElementById('success').textContent = successCount;
            document.getElementById('failed').textContent = failedCount;
            document.getElementById('loadFailed').textContent = loadFailedCount;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            successCount = 0;
            failedCount = 0;
            loadFailedCount = 0;
            updateStats();
        }

        async function startTest() {
            clearLog();
            log('开始详细测试...', 'info');
            
            try {
                log('第一步: 测试API连接', 'info');
                const response = await fetch('/api/player-cards?limit=5');
                if (!response.ok) {
                    log(`API连接失败: HTTP ${response.status}`, 'error');
                    return;
                }
                log('API连接成功', 'success');
                
                log('第二步: 测试JSON解析', 'info');
                const data = await response.json();
                if (!data || !data.success) {
                    log('JSON解析失败或数据格式错误', 'error');
                    return;
                }
                log('JSON解析成功', 'success');
                
                log('第三步: 测试逐个渲染球员', 'info');
                await testRenderOneByOne();
                
                log('第四步: 测试批量渲染', 'info');
                await testBatchRender();
                
                log('测试完成！', 'success');
                
            } catch (e) {
                log(`测试过程中发生错误: ${e.message}`, 'error');
                console.error(e);
            }
        }

        async function testRenderOneByOne() {
            try {
                const response = await fetch('/api/player-cards?limit=20');
                const data = await response.json();
                
                if (!data || !data.success || !Array.isArray(data.players)) {
                    log('获取测试数据失败', 'error');
                    return;
                }
                
                log(`开始逐个渲染 ${data.players.length} 个球员...`, 'info');
                
                data.players.forEach((player, index) => {
                    try {
                        // 测试创建卡片HTML
                        const html = createPlayerCard(player);
                        // 测试DOM插入
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = html;
                        
                        successCount++;
                        if ((index + 1) % 10 === 0) {
                            log(`已成功渲染 ${index + 1} 个球员`, 'info');
                        }
                    } catch (e) {
                        failedCount++;
                        log(`渲染球员 ${player.name || index} 失败: ${e.message}`, 'error');
                    }
                });
                
                updateStats();
                
            } catch (e) {
                loadFailedCount++;
                log(`加载数据失败: ${e.message}`, 'error');
            }
        }

        async function testBatchRender() {
            try {
                log('测试批量渲染所有球员...', 'info');
                
                let allPlayers = [];
                let page = 0;
                const pageSize = 50;
                let total = 1000; // 初始值
                
                while (page * pageSize < total) {
                    try {
                        const response = await fetch(`/api/player-cards?limit=${pageSize}&offset=${page * pageSize}`);
                        const data = await response.json();
                        
                        if (!data || !data.success) {
                            log(`获取第 ${page + 1} 页失败`, 'error');
                            break;
                        }
                        
                        total = data.total;
                        allPlayers = [...allPlayers, ...data.players];
                        log(`成功获取第 ${page + 1} 页，共 ${allPlayers.length}/${total} 球员`, 'info');
                        
                        page++;
                        
                        // 每获取100个球员测试一次渲染
                        if (allPlayers.length % 100 === 0) {
                            try {
                                const container = document.createElement('div');
                                allPlayers.forEach(p => {
                                    container.innerHTML += createPlayerCard(p);
                                });
                                log(`成功渲染 ${allPlayers.length} 个球员`, 'success');
                            } catch (e) {
                                log(`渲染 ${allPlayers.length} 个球员时失败: ${e.message}`, 'error');
                                break;
                            }
                        }
                        
                    } catch (e) {
                        log(`获取第 ${page + 1} 页时发生错误: ${e.message}`, 'error');
                        break;
                    }
                }
                
                log(`批量测试完成，共加载 ${allPlayers.length} 个球员`, 'success');
                
            } catch (e) {
                log(`批量测试失败: ${e.message}`, 'error');
            }
        }

        function createPlayerCard(player) {
            if (!player || !player.name) {
                throw new Error('缺少必需字段: name');
            }
            
            return `
                <div class="player-card">
                    ${player.avatar_url ? `<img src="${player.avatar_url}" alt="${player.name}" class="player-avatar" onerror="this.style.display='none';">` : ''}
                    <h3>${player.name}</h3>
                    ${player.nickname ? `<p>"${player.nickname}"</p>` : ''}
                    ${player.body_info ? `<p>${player.body_info}</p>` : ''}
                </div>
            `;
        }
    </script>
</body>
</html>
