<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员卡片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .player-card { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; }
        .player-avatar { width: 75px; height: 95px; border-radius: 8px; margin-bottom: 10px; object-fit: contain; }
        .player-name { font-weight: bold; font-size: 18px; }
        .player-nickname { color: #fbbf24; font-style: italic; }
        .loading { text-align: center; padding: 50px; }
        .error { text-align: center; color: #ff6b6b; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀 NBA球员卡片</h1>
            <p>共 <span id="count">0</span> 位球员</p>
        </div>
        <div class="cards-grid" id="cardsGrid">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        async function loadPlayers() {
            const container = document.getElementById('cardsGrid');
            const countSpan = document.getElementById('count');
            
            try {
                // 使用简化版API，不包含头像
                const response = await fetch('/api/player-cards-light?limit=100');
                const data = await response.json();
                
                if (data && data.success && Array.isArray(data.players)) {
                    countSpan.textContent = data.total;
                    container.innerHTML = data.players.map(player => createCard(player)).join('');
                } else {
                    container.innerHTML = '<div class="error">加载失败</div>';
                }
            } catch (e) {
                console.error('Error:', e);
                container.innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
            }
        }

        function createCard(player) {
            if (!player || !player.name) return '';
            
            return `
                <div class="player-card">
                    <div style="width: 80px; height: 80px; border-radius: 50%; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 24px;">
                        ${player.name.charAt(0)}
                    </div>
                    <div class="player-name">${player.name}</div>
                    ${player.nickname ? `<div class="player-nickname">"${player.nickname}"</div>` : ''}
                    ${player.body_info ? `<div style="margin-top: 10px; font-size: 14px; color: #aaa;">${player.body_info}</div>` : ''}
                </div>
            `;
        }

        loadPlayers();
    </script>
</body>
</html>
