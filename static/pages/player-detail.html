<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球员详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .back-btn { 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 5px; 
            color: #fff; 
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .page-title { font-size: 1.8rem; color: #45b7d1; }
        
        /* Player Card */
        .player-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .card-header { display: flex; gap: 30px; align-items: flex-start; }
        .avatar-container { 
            width: 200px; 
            height: 250px; 
            border-radius: 15px; 
            flex-shrink: 0;
            overflow: hidden;
            background: transparent;
        }
        .avatar-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain;
            border-radius: 15px;
        }
        
        .player-info-main { flex: 1; }
        .player-name-row { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .player-name { font-size: 2.5rem; font-weight: bold; }
        .player-number { 
            background: rgba(69, 183, 209, 0.2); 
            padding: 8px 16px; 
            border-radius: 25px; 
            font-weight: bold; 
            font-size: 1.1rem;
            color: #45b7d1;
        }
        .player-nickname { font-size: 1.2rem; color: #fbbf24; font-style: italic; margin-bottom: 20px; }
        
        .player-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .meta-item { display: flex; justify-content: space-between; padding: 12px 15px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .meta-label { color: #94a3b8; font-weight: 500; }
        .meta-value { color: #fff; font-weight: 600; }
        
        /* Section */
        .section { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .section-title { font-size: 1.3rem; color: #45b7d1; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: #45b7d1; border-radius: 2px; }
        
        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }
        .stat-box { text-align: center; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #4ecdc4; }
        .stat-label { color: #94a3b8; font-size: 0.9rem; margin-top: 5px; }
        
        /* Draft */
        .draft-info { display: flex; flex-wrap: wrap; gap: 20px; }
        .draft-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 8px; }
        .draft-label { color: #94a3b8; }
        .draft-value { font-weight: bold; color: #45b7d1; }
        
        /* Awards */
        .awards-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .award-badge { 
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); 
            padding: 8px 16px; 
            border-radius: 20px; 
            color: #1a1a2e; 
            font-weight: 600;
        }
        
        /* Timeline */
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { 
            content: ''; 
            position: absolute; 
            left: 10px; 
            top: 0; 
            bottom: 0; 
            width: 2px; 
            background: linear-gradient(180deg, #45b7d1 0%, #2980b9 100%);
            border-radius: 1px;
        }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-item::before { 
            content: ''; 
            position: absolute; 
            left: -24px; 
            top: 5px; 
            width: 12px; 
            height: 12px; 
            background: #45b7d1; 
            border-radius: 50%;
            border: 3px solid #1a1a2e;
        }
        .timeline-content { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .timeline-team { font-weight: bold; color: #45b7d1; font-size: 1.1rem; }
        .timeline-years { color: #94a3b8; font-size: 0.9rem; }
        
        /* Bio */
        .bio-content { line-height: 1.8; color: #cbd5e1; text-align: justify; }
        
        /* Loading */
        .loading { text-align: center; padding: 100px; color: #94a3b8; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(69, 183, 209, 0.3); border-top-color: #45b7d1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Responsive */
        @media (max-width: 768px) {
            .card-header { flex-direction: column; align-items: center; text-align: center; }
            .player-name-row { flex-direction: column; gap: 10px; }
            .player-name { font-size: 2rem; }
            .avatar-container { width: 140px; height: 175px; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="/player-cards" class="back-btn">← 返回列表</a>
            <h1 class="page-title" id="pageTitle">球员详情</h1>
        </div>
        
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadPlayerDetail() {
            try {
                const path = window.location.pathname;
                const playerId = path.split('/').pop();
                
                const response = await fetch(`/api/players/${playerId}`);
                const data = await response.json();
                
                if (data.success && data.player) {
                    renderPlayer(data.player);
                } else {
                    document.getElementById('content').innerHTML = '<div class="loading"><p>球员未找到</p></div>';
                }
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('content').innerHTML = '<div class="loading"><p>加载失败</p></div>';
            }
        }
        
        function renderPlayer(p) {
            document.getElementById('pageTitle').textContent = p.name;
            
            const height = p.physical_info?.height || p.height || '';
            const weight = p.physical_info?.weight || p.weight || '';
            
            let html = `
                <div class="player-card">
                    <div class="card-header">
                        <div class="avatar-container">
                            <img src="${p.avatar_url || ''}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;height:100%;font-size:60px>${p.name.charAt(0)}</div>'">
                        </div>
                        <div class="player-info-main">
                            <div class="player-name-row">
                                <div class="player-name">${p.name}</div>
                                ${p.primary_number ? `<div class="player-number">#${p.primary_number}</div>` : ''}
                            </div>
                            ${p.nickname ? `<div class="player-nickname">"${p.nickname}"</div>` : ''}
                            
                            <div class="player-meta">
                                <div class="meta-item">
                                    <span class="meta-label">位置</span>
                                    <span class="meta-value">${p.position || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">生日</span>
                                    <span class="meta-value">${p.birth_date || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">身高</span>
                                    <span class="meta-value">${height || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">体重</span>
                                    <span class="meta-value">${weight || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">臂展</span>
                                    <span class="meta-value">${p.wingspan || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">大学/联赛</span>
                                    <span class="meta-value">${p.college || 'N/A'}</span>
                                </div>
                                <div class="meta-item">
                                    <span class="meta-label">生涯年份</span>
                                    <span class="meta-value">${p.career_span?.from_year || 'N/A'} - ${p.career_span?.to_year || '至今'}</span>
                                </div>
                                <div class="meta-item">
                                    <a href="/player-evolution/${p.player_id}" class="back-btn" style="background: linear-gradient(135deg, #45b7d1, #2196f3); border-color: #45b7d1; padding: 4px 12px; font-size: 13px;">
                                        📈 查看能力进化
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h2 class="section-title">生涯数据</h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.games || 0}</div>
                            <div class="stat-label">出场次数</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.minutes_played || 0}</div>
                            <div class="stat-label">总出场时间</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.pts_per_game || 0}</div>
                            <div class="stat-label">场均得分</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.trb_per_game || 0}</div>
                            <div class="stat-label">场均篮板</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.ast_per_game || 0}</div>
                            <div class="stat-label">场均助攻</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.stl_per_game || 0}</div>
                            <div class="stat-label">场均抢断</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.blk_per_game || 0}</div>
                            <div class="stat-label">场均盖帽</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.fg_pct || 0}%</div>
                            <div class="stat-label">投篮命中率</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value">${p.career_stats?.threep_pct || 0}%</div>
                            <div class="stat-label">三分命中率</div>
                        </div>
                    </div>
                </div>
            `;
            
            if (p.draft_info) {
                html += `
                    <div class="section">
                        <h2 class="section-title">选秀信息</h2>
                        <div class="draft-info">
                            <div class="draft-item">
                                <span class="draft-label">年份:</span>
                                <span class="draft-value">${p.draft_info.year}</span>
                            </div>
                            <div class="draft-item">
                                <span class="draft-label">轮次:</span>
                                <span class="draft-value">第${p.draft_info.round}轮</span>
                            </div>
                            <div class="draft-item">
                                <span class="draft-label">顺位:</span>
                                <span class="draft-value">第${p.draft_info.pick}顺位</span>
                            </div>
                            ${p.draft_info.team ? `<div class="draft-item">
                                <span class="draft-label">选中球队:</span>
                                <span class="draft-value">${p.draft_info.team}</span>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }
            
            if (p.awards && p.awards.length > 0) {
                html += `
                    <div class="section">
                        <h2 class="section-title">荣誉奖项</h2>
                        <div class="awards-list">
                            ${p.awards.map(award => `<span class="award-badge">${award}</span>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (p.career_teams && p.career_teams.length > 0) {
                html += `
                    <div class="section">
                        <h2 class="section-title">生涯球队</h2>
                        <div class="timeline">
                            ${p.career_teams.map((team, index) => `
                                <div class="timeline-item">
                                    <div class="timeline-content">
                                        <div class="timeline-team">${team}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            if (p.bio) {
                html += `
                    <div class="section">
                        <h2 class="section-title">个人简介</h2>
                        <div class="bio-content">${p.bio}</div>
                    </div>
                `;
            }
            
            document.getElementById('content').innerHTML = html;
        }
        
        loadPlayerDetail();
    </script>
</body>
</html>
