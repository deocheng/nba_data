<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球员能力进化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .back-btn { 
            padding: 10px 20px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 5px; 
            color: #fff; 
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .page-title { font-size: 1.8rem; color: #45b7d1; }
        .player-name { font-size: 1.5rem; color: #fbbf24; }
        
        /* Loading */
        .loading { text-align: center; padding: 50px; font-size: 1.2rem; }
        
        /* Grid Layout */
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px; }
        
        /* Section Cards */
        .section-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
        }
        .section-title { font-size: 1.4rem; color: #45b7d1; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        /* Radar Chart */
        .chart-container { position: relative; height: 400px; }
        
        /* Season Selector */
        .season-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .season-btn { 
            padding: 8px 16px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 20px; 
            color: #fff; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .season-btn:hover { background: rgba(255,255,255,0.2); }
        .season-btn.active { background: linear-gradient(135deg, #45b7d1, #2196f3); border-color: #45b7d1; }
        
        /* Timeline */
        .timeline-section { grid-column: 1 / -1; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { 
            content: ''; 
            position: absolute; 
            left: 8px; 
            top: 0; 
            bottom: 0; 
            width: 4px; 
            background: linear-gradient(to bottom, #45b7d1, #fbbf24);
            border-radius: 2px;
        }
        .timeline-item { 
            position: relative; 
            margin-bottom: 30px; 
            padding: 20px; 
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border-left: 4px solid #45b7d1;
        }
        .timeline-item::before { 
            content: ''; 
            position: absolute; 
            left: -36px; 
            top: 25px; 
            width: 16px; 
            height: 16px; 
            background: #45b7d1;
            border-radius: 50%;
            border: 3px solid #1a1a2e;
        }
        .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .timeline-season { font-size: 1.3rem; font-weight: bold; color: #fbbf24; }
        .timeline-team { font-size: 1rem; color: #45b7d1; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .stat-item { text-align: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #45b7d1; }
        .stat-label { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        
        .awards { display: flex; gap: 10px; flex-wrap: wrap; }
        .award-badge { 
            padding: 5px 12px; 
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 15px; 
            font-size: 0.85rem;
            color: #1a1a2e;
            font-weight: 600;
        }
        
        /* Comparison Mode */
        .comparison-toggle { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .toggle-label { color: #aaa; }
        .checkbox { width: 20px; height: 20px; }
        
        /* Responsive */
        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="#" class="back-btn" onclick="goBack()">← 返回</a>
            <div>
                <h1 class="page-title">能力进化分析</h1>
                <p class="player-name" id="playerName">加载中...</p>
            </div>
        </div>
        
        <div id="loading" class="loading">正在加载数据...</div>
        
        <div id="content" style="display: none;">
            <div class="content-grid">
                <!-- Radar Chart Section -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span>🏀</span> 能力雷达图
                    </h2>
                    <div class="comparison-toggle">
                        <input type="checkbox" id="comparisonMode" class="checkbox" onchange="toggleComparison()">
                        <label for="comparisonMode" class="toggle-label">对比多个赛季</label>
                    </div>
                    <div class="season-selector" id="seasonSelector"></div>
                    <div class="chart-container">
                        <canvas id="radarChart"></canvas>
                    </div>
                </div>
                
                <!-- Stats Evolution -->
                <div class="section-card">
                    <h2 class="section-title">
                        <span>📊</span> 场均数据对比
                    </h2>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Timeline Section -->
            <div class="section-card timeline-section">
                <h2 class="section-title">
                    <span>📅</span> 赛季历程
                </h2>
                <div class="timeline" id="timeline"></div>
            </div>
        </div>
    </div>

    <script>
        let playerData = null;
        let radarChart = null;
        let trendChart = null;
        let selectedSeasons = [];
        
        // Get player ID from URL
        function getPlayerId() {
            const path = window.location.pathname;
            const parts = path.split('/');
            const idStr = parts[parts.length - 1];
            return parseInt(idStr) || 446; // Default to Wembanyama
        }
        
        function goBack() {
            const playerId = getPlayerId();
            window.location.href = `/player/${playerId}`;
        }
        
        async function loadPlayerData() {
            try {
                const playerId = getPlayerId();
                const response = await fetch(`/api/players/${playerId}/season-data`);
                const data = await response.json();
                
                if (data.success) {
                    playerData = data;
                    document.getElementById('playerName').textContent = data.player_name;
                    selectedSeasons = [data.seasons[0].season]; // Select latest season
                    renderSeasonSelector();
                    renderCharts();
                    renderTimeline();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').textContent = '加载失败，请刷新重试';
            }
        }
        
        function renderSeasonSelector() {
            const container = document.getElementById('seasonSelector');
            container.innerHTML = '';
            
            playerData.seasons.forEach(season => {
                const btn = document.createElement('button');
                btn.className = 'season-btn';
                if (selectedSeasons.includes(season.season)) {
                    btn.classList.add('active');
                }
                btn.textContent = season.season;
                btn.onclick = () => toggleSeason(season.season);
                container.appendChild(btn);
            });
        }
        
        function toggleSeason(seasonName) {
            const comparisonMode = document.getElementById('comparisonMode').checked;
            
            if (comparisonMode) {
                const idx = selectedSeasons.indexOf(seasonName);
                if (idx > -1) {
                    if (selectedSeasons.length > 1) {
                        selectedSeasons.splice(idx, 1);
                    }
                } else {
                    selectedSeasons.push(seasonName);
                }
            } else {
                selectedSeasons = [seasonName];
            }
            
            renderSeasonSelector();
            renderCharts();
        }
        
        function toggleComparison() {
            const comparisonMode = document.getElementById('comparisonMode').checked;
            if (!comparisonMode && selectedSeasons.length > 1) {
                selectedSeasons = [selectedSeasons[0]];
                renderSeasonSelector();
            }
            renderCharts();
        }
        
        function getSeasonColors() {
            return [
                'rgba(69, 183, 209, 0.7)',
                'rgba(251, 191, 36, 0.7)',
                'rgba(72, 187, 120, 0.7)',
                'rgba(236, 72, 153, 0.7)',
                'rgba(167, 139, 250, 0.7)'
            ];
        }
        
        function renderCharts() {
            renderRadarChart();
            renderTrendChart();
        }
        
        function renderRadarChart() {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChart) {
                radarChart.destroy();
            }
            
            const labels = ['得分能力', '篮板能力', '助攻能力', '防守能力', '效率值'];
            const colors = getSeasonColors();
            
            const datasets = selectedSeasons.map((seasonName, idx) => {
                const season = playerData.seasons.find(s => s.season === seasonName);
                return {
                    label: seasonName,
                    data: [
                        season.abilities.scoring,
                        season.abilities.rebounding,
                        season.abilities.playmaking,
                        season.abilities.defense,
                        season.abilities.efficiency
                    ],
                    backgroundColor: colors[idx % colors.length].replace('0.7', '0.2'),
                    borderColor: colors[idx % colors.length],
                    borderWidth: 2,
                    pointBackgroundColor: colors[idx % colors.length],
                    pointBorderColor: '#fff',
                    pointRadius: 4
                };
            });
            
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: { color: '#fff', font: { size: 12 } },
                            ticks: { color: '#aaa', backdropColor: 'transparent' }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff', font: { size: 12 } }
                        }
                    }
                }
            });
        }
        
        function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            
            if (trendChart) {
                trendChart.destroy();
            }
            
            // Get all seasons for trend - limit to last 3 seasons
            const allSeasons = [...playerData.seasons].reverse().slice(0, 3);
            
            // Define colors for different seasons
            const seasonColors = [
                { bg: 'rgba(69, 183, 209, 0.8)', border: '#45b7d1' },
                { bg: 'rgba(251, 191, 36, 0.8)', border: '#fbbf24' },
                { bg: 'rgba(74, 222, 128, 0.8)', border: '#4ade80' },
                { bg: 'rgba(239, 68, 68, 0.8)', border: '#ef4444' },
                { bg: 'rgba(168, 85, 247, 0.8)', border: '#a855f7' }
            ];
            
            // X-axis labels: stat categories
            const statLabels = ['场均得分', '场均篮板', '场均助攻'];
            
            // Create datasets: one dataset per season
            const datasets = allSeasons.map((season, index) => {
                const colors = seasonColors[index % seasonColors.length];
                return {
                    label: season.season,
                    data: [
                        season.stats.pts_per_game,
                        season.stats.trb_per_game,
                        season.stats.ast_per_game
                    ],
                    backgroundColor: colors.bg,
                    borderColor: colors.border,
                    borderWidth: 1
                };
            });
            
            trendChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: statLabels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#fff', font: { size: 14 } } 
                        },
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.1)' }, 
                            ticks: { color: '#fff' } 
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#fff', font: { size: 12 } }
                        }
                    }
                }
            });
        }
        
        function renderTimeline() {
            const container = document.getElementById('timeline');
            container.innerHTML = '';
            
            playerData.seasons.forEach(season => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `
                    <div class="timeline-header">
                        <span class="timeline-season">${season.season}</span>
                        <span class="timeline-team">${season.team}</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${season.games}</div>
                            <div class="stat-label">出场</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.games_started}</div>
                            <div class="stat-label">首发</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.minutes_per_game}</div>
                            <div class="stat-label">分钟</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.pts_per_game}</div>
                            <div class="stat-label">得分</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.trb_per_game}</div>
                            <div class="stat-label">篮板</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.ast_per_game}</div>
                            <div class="stat-label">助攻</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.stl_per_game}</div>
                            <div class="stat-label">抢断</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.blk_per_game}</div>
                            <div class="stat-label">盖帽</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.fg_pct}%</div>
                            <div class="stat-label">命中率</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${season.stats.three_p_pct}%</div>
                            <div class="stat-label">三分率</div>
                        </div>
                    </div>
                    ${season.awards ? `
                        <div class="awards">
                            ${season.awards.split(',').map(a => `<span class="award-badge">${a.trim()}</span>`).join('')}
                        </div>
                    ` : ''}
                `;
                container.appendChild(item);
            });
        }
        
        // Initialize
        loadPlayerData();
    </script>
</body>
</html>
