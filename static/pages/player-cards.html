<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员卡片</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 30px; padding: 20px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; color: #45b7d1; }
        .header p { color: #94a3b8; font-size: 1.1rem; }
        
        /* Filters */
        .filters { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { color: #94a3b8; font-weight: 500; }
        .filter-group select, .filter-group input { 
            padding: 10px 15px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 5px; 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
            font-size: 14px;
        }
        .filter-group input::placeholder { color: #64748b; }
        .filter-group select option { background: #1a1a2e; color: #fff; }
        .btn { 
            padding: 10px 20px; 
            background: linear-gradient(135deg, #45b7d1 0%, #2980b9 100%); 
            border: none; 
            border-radius: 5px; 
            color: #fff; 
            cursor: pointer; 
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        
        /* Stats */
        .stats-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #4ecdc4; }
        .stat-label { color: #94a3b8; font-size: 0.9rem; }
        
        /* Cards Grid */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Player Card */
        .player-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .player-card:hover { 
            transform: translateY(-5px); 
            border-color: rgba(69, 183, 209, 0.5);
            box-shadow: 0 10px 40px rgba(69, 183, 209, 0.15);
        }
        
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar-wrapper { 
            width: 75px; 
            height: 95px; 
            border-radius: 8px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
            overflow: hidden;
            background: transparent;
        }
        .avatar-wrapper img { width: 100%; height: 100%; border-radius: 8px; object-fit: contain; }
        
        .player-info { flex: 1; min-width: 0; }
        .player-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 2px; }
        .player-nickname { color: #fbbf24; font-style: italic; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .player-number { 
            background: rgba(69, 183, 209, 0.2); 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.9rem;
            color: #45b7d1;
        }
        
        .player-details { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .detail-label { color: #94a3b8; }
        .detail-value { color: #fff; font-weight: 500; }
        
        .team-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .team-badge { 
            background: rgba(255,255,255,0.1); 
            padding: 3px 8px; 
            border-radius: 3px; 
            font-size: 0.75rem; 
            color: #cbd5e1;
        }
        
        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 30px; }
        .page-btn { 
            width: 40px; 
            height: 40px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50%; 
            background: transparent; 
            color: #fff; 
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover { background: rgba(69, 183, 209, 0.3); }
        .page-btn.active { background: #45b7d1; border-color: #45b7d1; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Loading */
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(69, 183, 209, 0.3); border-top-color: #45b7d1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Responsive */
        @media (max-width: 768px) {
            .filters { flex-direction: column; align-items: stretch; }
            .filter-group { justify-content: space-between; }
            .header h1 { font-size: 1.8rem; }
            .cards-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀 NBA球员卡片</h1>
            <p>浏览所有球员，查看详细信息</p>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label>搜索:</label>
                <input type="text" id="searchInput" placeholder="输入球员姓名或绰号" onkeyup="handleSearch()">
            </div>
            <div class="filter-group">
                <label>位置:</label>
                <select id="positionFilter" onchange="handleFilter()">
                    <option value="">全部位置</option>
                </select>
            </div>
            <button class="btn" onclick="resetFilters()">重置筛选</button>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总球员</div>
            </div>
        </div>
        
        <div class="cards-grid" id="cardsGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
        
        <div class="pagination" id="pagination">
            <button class="page-btn" id="prevBtn" onclick="prevPage()" disabled>‹</button>
            <span id="pageInfo">第 1 页</span>
            <button class="page-btn" id="nextBtn" onclick="nextPage()" disabled>›</button>
        </div>
    </div>

    <script>
        let allPlayers = [];
        let filteredPlayers = [];
        let currentPage = 0;
        const pageSize = 20;
        let totalPages = 1;
        
        async function loadPlayers() {
            try {
                const response = await fetch('/api/player-cards?limit=100&include_avatar=true');
                const data = await response.json();
                
                if (data.success) {
                    allPlayers = data.players;
                    filteredPlayers = [...allPlayers];
                    totalPages = Math.ceil(filteredPlayers.length / pageSize);
                    loadPositions();
                    renderCards();
                    updateStats();
                }
            } catch (e) {
                console.error('Error loading players:', e);
                document.getElementById('cardsGrid').innerHTML = '<div class="loading"><p>加载失败，请稍后重试</p></div>';
            }
        }
        
        async function loadPositions() {
            try {
                const response = await fetch('/api/players/positions');
                const data = await response.json();
                
                if (data.success) {
                    const select = document.getElementById('positionFilter');
                    data.positions.forEach(pos => {
                        const option = document.createElement('option');
                        option.value = pos;
                        option.textContent = pos;
                        select.appendChild(option);
                    });
                }
            } catch (e) {
                console.error('Error loading positions:', e);
            }
        }
        
        function renderCards() {
            const container = document.getElementById('cardsGrid');
            const start = currentPage * pageSize;
            const end = start + pageSize;
            const players = filteredPlayers.slice(start, end);
            
            if (players.length === 0) {
                container.innerHTML = '<div class="loading"><p>没有找到匹配的球员</p></div>';
                return;
            }
            
            container.innerHTML = players.map(player => createCard(player)).join('');
            updatePagination();
        }
        
        function createCard(player) {
            const height = player.height || (player.physical_info?.height || '');
            const weight = player.weight || (player.physical_info?.weight || '');
            const teams = player.career_teams?.slice(0, 3) || [];
            
            return `
                <div class="player-card" onclick="openPlayerDetail(${player.player_id})">
                    <div class="card-header">
                        <div class="avatar-wrapper">
                            ${player.avatar_url ? `<img src="${player.avatar_url}" alt="${player.name}" onerror="this.parentElement.innerHTML='${player.name.charAt(0)}'">` : player.name.charAt(0)}
                        </div>
                        <div class="player-info">
                            <div class="player-name">${player.name}</div>
                            ${player.nickname ? `<div class="player-nickname">"${player.nickname}"</div>` : ''}
                        </div>
                        ${player.primary_number ? `<div class="player-number">#${player.primary_number}</div>` : ''}
                    </div>
                    
                    <div class="player-details">
                        <div class="detail-row">
                            <span class="detail-label">位置</span>
                            <span class="detail-value">${player.position || 'N/A'}</span>
                        </div>
                        ${height ? `<div class="detail-row">
                            <span class="detail-label">身高</span>
                            <span class="detail-value">${height}</span>
                        </div>` : ''}
                        ${weight ? `<div class="detail-row">
                            <span class="detail-label">体重</span>
                            <span class="detail-value">${weight}</span>
                        </div>` : ''}
                        ${player.college ? `<div class="detail-row">
                            <span class="detail-label">大学</span>
                            <span class="detail-value">${player.college}</span>
                        </div>` : ''}
                    </div>
                    
                    ${teams.length > 0 ? `<div class="team-badges">
                        ${teams.map(team => `<span class="team-badge">${team}</span>`).join('')}
                    </div>` : ''}
                </div>
            `;
        }
        
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            filterPlayers(keyword, document.getElementById('positionFilter').value);
        }
        
        function handleFilter() {
            const position = document.getElementById('positionFilter').value;
            filterPlayers(document.getElementById('searchInput').value.toLowerCase(), position);
        }
        
        function filterPlayers(keyword, position) {
            filteredPlayers = allPlayers.filter(player => {
                const matchKeyword = !keyword || 
                    player.name.toLowerCase().includes(keyword) || 
                    (player.nickname && player.nickname.toLowerCase().includes(keyword));
                const matchPosition = !position || player.position === position;
                return matchKeyword && matchPosition;
            });
            
            currentPage = 0;
            totalPages = Math.ceil(filteredPlayers.length / pageSize);
            renderCards();
            updateStats();
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('positionFilter').value = '';
            filteredPlayers = [...allPlayers];
            currentPage = 0;
            totalPages = Math.ceil(filteredPlayers.length / pageSize);
            renderCards();
            updateStats();
        }
        
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderCards();
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderCards();
            }
        }
        
        function updatePagination() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');
            
            prevBtn.disabled = currentPage === 0;
            nextBtn.disabled = currentPage >= totalPages - 1;
            pageInfo.textContent = `第 ${currentPage + 1} / ${totalPages} 页`;
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = filteredPlayers.length;
        }
        
        function openPlayerDetail(playerId) {
            window.location.href = `/player/${playerId}`;
        }
        
        // 页面加载时执行
        loadPlayers();
    </script>
</body>
</html>
