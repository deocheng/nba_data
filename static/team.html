<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球队 - NBA数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/styles/variables.css">
    <link rel="stylesheet" href="/static/styles/common.css">
    <link rel="stylesheet" href="/static/styles/navbar.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--team-bg, #000000);
            min-height: 100vh;
            color: var(--team-primary, #ffffff);
        }

        .header {
            background: linear-gradient(135deg, var(--team-secondary, #000000), var(--team-color, #333333));
            padding: 2rem;
            text-align: center;
            padding-top: 120px;
            border-bottom: 3px solid var(--team-primary, #ffffff);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header .team-logo-large {
            width: 120px;
            height: 120px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--team-primary, #ffffff);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .team-meta {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        .team-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: 2px solid transparent;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--team-primary, #ffffff);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--team-primary, #ffffff);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--team-primary, #ffffff), var(--team-secondary, #000000));
            color: var(--team-secondary, #000000);
            border-color: var(--team-primary, #ffffff);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .season-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .season-btn {
            padding: 8px 20px;
            font-size: 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--team-primary, #ffffff);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .season-btn:hover {
            border-color: var(--team-primary, #ffffff);
        }

        .season-btn.active {
            background: var(--team-primary, #ffffff);
            color: var(--team-secondary, #000000);
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            color: #ffffff;
        }

        .card-title {
            font-size: 1.3rem;
            color: #ffffff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 20px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--team-primary, #ffffff);
        }

        .stat-item .label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-top: 5px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            color: var(--team-primary, #ffffff);
        }

        .player-card:hover {
            transform: translateY(-5px);
            border-color: var(--team-primary, #ffffff);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .player-number {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 50%;
            background: var(--team-primary, #ffffff);
            color: var(--team-secondary, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: #ffffff;
            font-size: 1rem;
        }

        .player-position {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .player-info {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        .game-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .game-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            gap: 20px;
        }

        .game-item.win {
            border-left: 3px solid #4ade80;
        }

        .game-item.loss {
            border-left: 3px solid #ef4444;
        }

        .game-info {
            flex: 1;
            text-align: left;
        }

        .game-opponent {
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .game-date {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .game-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px 25px;
            min-width: 160px;
        }

        .game-score .team-score {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--team-primary, #ffffff);
        }

        .game-score .opp-score {
            font-weight: 700;
            font-size: 1.5rem;
            color: #888888;
        }

        .game-score.win .team-score {
            text-shadow: 0 0 10px var(--team-primary, #ffffff);
        }

        .game-score.loss .team-score {
            color: #888888;
        }

        .game-score.loss .opp-score {
            color: var(--team-primary, #ffffff);
            text-shadow: 0 0 10px var(--team-primary, #ffffff);
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
        }

        .empty-message {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px;
        }

        .schedule-select-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
        }

        select option {
            background: #1a1a2e;
            color: #ffffff;
        }

        .legends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .legend-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.05));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .legend-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
        }

        .legend-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.3);
        }

        .legend-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .legend-position {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .legend-years {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 15px;
            font-style: italic;
        }

        .legend-honors {
            margin-bottom: 15px;
        }

        .legend-honors .honor {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin: 2px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .legend-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .legend-stat {
            text-align: center;
        }

        .legend-stat .value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--team-primary, #ffffff);
        }

        .legend-stat .label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .header-content {
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .team-meta {
                flex-direction: column;
                gap: 10px;
            }

            .legends-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <h1>
            <div class="team-logo" id="team-logo"></div>
            <span id="team-name-cn">球队</span>
        </h1>
        <div class="team-info">
            <span id="team-name-en">Team</span>
            <span>|</span>
            <span id="team-alias">别名</span>
        </div>
        <nav>
            <a href="/">首页</a>
            <a href="/team-history" target="_blank">球队历史</a>
            <a href="/matchup" target="_blank">球队对阵</a>
            <a href="/player-compare" target="_blank">球员对比</a>
            <a href="/legendary-players" target="_blank">传奇球员</a>
            <a href="/player-radar" target="_blank">能力雷达图</a>
            <a href="/rankings" target="_blank">高阶数据</a>
        </nav>
    </nav>

    <div class="content" id="team-page" style="display: none;">
        <div class="header">
            <div class="header-content">
                <div class="team-logo-large" id="team-logo-large"></div>
                <div>
                    <h1 id="header-team-name-cn">球队</h1>
                    <p id="header-team-name-en">Team Name</p>
                    <div class="team-meta">
                        <div class="team-meta-item">
                            <span>🏆</span>
                            <span id="team-championships">0</span>次总冠军
                        </div>
                        <div class="team-meta-item">
                            <span>🌍</span>
                            <span id="team-conference">西部</span>
                        </div>
                        <div class="team-meta-item">
                            <span>📍</span>
                            <span id="team-division">太平洋</span>赛区
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="tabs">
                <button class="tab-btn active" data-tab="roster">球队阵容</button>
                <button class="tab-btn" data-tab="schedule">赛季赛程</button>
                <button class="tab-btn" data-tab="stats">赛季统计</button>
                <button class="tab-btn" data-tab="legends">队史名宿</button>
            </div>

            <div id="roster" class="tab-content active">
                <div class="card">
                    <div class="card-title">球队阵容</div>
                    <div class="roster-grid" id="roster-grid"></div>
                </div>
            </div>

            <div id="schedule" class="tab-content">
                <div class="schedule-select-container">
                    <button class="season-btn" id="prev-season-btn">◀ 上赛季</button>
                    <select id="schedule-season-select"></select>
                    <button class="season-btn" id="next-season-btn">下赛季 ▶</button>
                </div>
                <div class="card">
                    <div class="card-title">赛季赛程</div>
                    <div class="game-list" id="schedule-list"></div>
                </div>
            </div>

            <div id="stats" class="tab-content">
                <div class="season-selector" id="stats-season-selector"></div>
                <div class="card">
                    <div class="card-title">赛季统计</div>
                    <div class="stats-grid" id="season-stats"></div>
                </div>
                <div class="card">
                    <div class="card-title">得分趋势</div>
                    <div class="chart-wrapper">
                        <canvas id="trend-chart"></canvas>
                    </div>
                </div>
            </div>

            <div id="legends" class="tab-content">
                <div class="card">
                    <div class="card-title">队史名宿</div>
                    <div class="legends-grid" id="legends-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/modules/constants.js"></script>
    <script src="/static/modules/utils.js"></script>
    <script src="/static/modules/api.js"></script>
    <script src="/static/modules/navbar.js"></script>
    <script src="/static/modules/team-page.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);

            let team = urlParams.get('team');

            if (!team) {
                team = 'SAS';
            } else {
                // 清理球队参数 - 只保留字母
                team = team.replace(/[^A-Za-z]/g, '').trim().toUpperCase();
                
                const validTeams = ['SAS', 'LAL', 'OKC', 'HOU', 'GSW', 'BOS', 'MIA', 'MIL', 'DEN', 'DAL', 'PHX', 'NOP', 'MEM', 'MIN', 'LAC', 'SAC', 'PHI', 'TOR', 'BKN', 'NYK', 'CHI', 'CLE', 'IND', 'DET', 'ATL', 'CHA', 'ORL', 'WAS', 'UTA', 'POR'];

                if (!validTeams.includes(team)) {
                    console.log('Using default team SAS');
                    team = 'SAS';
                }
            }

            document.getElementById('team-logo-large').style.backgroundImage = `url('/nbalogo/${team}.svg')`;

            TeamPage.init(team);
        });
    </script>
</body>
</html>
