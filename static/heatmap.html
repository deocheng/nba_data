<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投篮热区展示</title>
    <link rel="stylesheet" href="/static/styles/shooting-heatmap.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .header {
            max-width: 910px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }
        
        .player-selector {
            display: flex;
            gap: 10px;
        }
        
        .player-btn {
            padding: 10px 20px;
            border: 2px solid #3b82f6;
            background: transparent;
            color: #3b82f6;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .player-btn:hover {
            background: #3b82f6;
            color: #fff;
        }
        
        .player-btn.active {
            background: #3b82f6;
            color: #fff;
        }
        
        #heatmap-container {
            max-width: 910px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>NBA投篮热区</h1>
        <div class="player-selector">
            <button class="player-btn active" data-player="victor_wembanyama">文班亚马</button>
            <button class="player-btn" data-player="devin_vassell">瓦塞尔</button>
            <button class="player-btn" data-player="keldon_johnson">凯尔登·约翰逊</button>
        </div>
    </div>
    
    <div id="heatmap-container"></div>
    
    <script src="/static/modules/shooting-heatmap.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('heatmap-container');
            let currentPlayer = 'victor_wembanyama';
            
            ShootingHeatmap.init('heatmap-container', currentPlayer);
            
            const buttons = document.querySelectorAll('.player-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    currentPlayer = this.dataset.player;
                    container.innerHTML = '';
                    ShootingHeatmap.init('heatmap-container', currentPlayer);
                });
            });
        });
    </script>
</body>
</html>
