<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA球员卡片</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .page-header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff, #c4ced4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .stat-item .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .search-box {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .search-box button {
            padding: 15px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .player-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .player-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .player-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-avatar {
            width: 100px;
            height: 130px;
            border-radius: 8px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .player-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .player-nickname {
            font-size: 14px;
            color: #fbbf24;
            font-style: italic;
            margin-bottom: 10px;
        }

        .player-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .jersey-number {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .player-body {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .body-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .body-stat {
            text-align: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .body-stat .value {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .body-stat .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .player-draft {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .draft-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .draft-text {
            flex: 1;
        }

        .draft-text .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .draft-text .value {
            font-size: 14px;
            color: #ffffff;
            font-weight: 600;
        }

        .player-bio {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 16px;
            max-height: 150px;
            overflow-y: auto;
        }

        .player-bio .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .player-bio .content {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        .error {
            text-align: center;
            padding: 60px;
            background: rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: #ef4444;
        }

        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .player-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .page-header h1 {
                font-size: 32px;
            }

            .body-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>🏀 NBA球员卡片</h1>
            <p>探索NBA球星的历史与成就</p>
            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="value" id="totalPlayers">0</div>
                    <div class="label">球员总数</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="withNickname">0</div>
                    <div class="label">有绰号</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="withAvatar">0</div>
                    <div class="label">有头像</div>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索球员姓名或绰号...">
            <button onclick="searchPlayers()">搜索</button>
        </div>

        <div id="playerCards" class="cards-grid">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        let allPlayers = [];

        async function loadPlayers() {
            try {
                const response = await fetch('/api/player-cards');
                const data = await response.json();

                if (data.success) {
                    allPlayers = data.players;
                    updateStats();
                    displayPlayers(allPlayers);
                } else {
                    document.getElementById('playerCards').innerHTML =
                        '<div class="error">加载失败: ' + data.error + '</div>';
                }
            } catch (error) {
                document.getElementById('playerCards').innerHTML =
                    '<div class="error">网络错误，请检查服务器连接</div>';
            }
        }

        function updateStats() {
            document.getElementById('totalPlayers').textContent = allPlayers.length;
            document.getElementById('withNickname').textContent =
                allPlayers.filter(p => p.nickname).length;
            document.getElementById('withAvatar').textContent =
                allPlayers.filter(p => p.avatar_url).length;
        }

        function displayPlayers(players) {
            const container = document.getElementById('playerCards');

            if (!players || players.length === 0) {
                container.innerHTML = '<div class="error">没有找到球员</div>';
                return;
            }

            container.innerHTML = players.map(player => createPlayerCard(player)).join('');

            // 为头像添加错误处理
            container.querySelectorAll('.player-avatar').forEach(img => {
                img.onerror = function() {
                    this.style.display = 'none';
                };
            });
        }

        function createPlayerCard(player) {
            const bodyParts = player.body_info ? player.body_info.split(',') : [];
            const height = bodyParts[0] ? bodyParts[0].trim() : '';
            const weight = bodyParts[1] ? bodyParts[1].trim() : '';

            const jerseyNumbers = player.jersey_numbers ?
                player.jersey_numbers.split(',').map(n => n.trim()).filter(n => n) : [];

            const shortBio = player.bio ?
                (player.bio.length > 200 ? player.bio.substring(0, 200) + '...' : player.bio) : '';

            return `
                <div class="player-card">
                    <div class="player-header">
                        ${player.avatar_url ?
                            `<img src="${player.avatar_url}" alt="${player.name}" class="player-avatar">` :
                            `<div class="player-avatar" style="display: flex; align-items: center; justify-content: center; font-size: 40px;">🏀</div>`
                        }
                        <div class="player-info">
                            <div class="player-name">${player.name}</div>
                            ${player.nickname ?
                                `<div class="player-nickname">"${player.nickname}"</div>` : ''
                            }
                            ${jerseyNumbers.length > 0 ? `
                                <div class="player-tags">
                                    ${jerseyNumbers.map(num => `<span class="jersey-number">#${num}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    ${player.body_info || player.draft_info ? `
                        <div class="player-body">
                            ${player.body_info ? `
                                <div class="body-info">
                                    ${height ? `<div class="body-stat"><div class="value">${height}</div><div class="label">身高</div></div>` : ''}
                                    ${weight ? `<div class="body-stat"><div class="value">${weight}</div><div class="label">体重</div></div>` : ''}
                                    ${player.draft_info ? `<div class="body-stat"><div class="value">${player.draft_info}</div><div class="label">选秀</div></div>` : ''}
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}

                    ${shortBio ? `
                        <div class="player-bio">
                            <div class="label">简介</div>
                            <div class="content">${shortBio}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function searchPlayers() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!query) {
                displayPlayers(allPlayers);
                return;
            }

            const filtered = allPlayers.filter(player => {
                const nameMatch = player.name.toLowerCase().includes(query);
                const nicknameMatch = player.nickname && player.nickname.toLowerCase().includes(query);
                return nameMatch || nicknameMatch;
            });

            displayPlayers(filtered);
        }

        // 回车搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPlayers();
            }
        });

        // 页面加载时获取数据
        loadPlayers();
    </script>
</body>
</html>
