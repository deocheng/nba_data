<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球员未找到 - NBA球员详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #000000; 
            min-height: 100vh; 
            color: #C4CED4;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.9);
            padding: 0.75rem 1.5rem;
            box-shadow: 0 2px 12px rgba(196, 206, 212, 0.12);
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 100;
            border-radius: 12px;
            border: 1px solid rgba(196, 206, 212, 0.2);
        }
        .navbar h1 { color: #C4CED4; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
        .navbar nav { margin-top: 0.5rem; }
        .navbar nav a {
            color: rgba(196, 206, 212, 0.8);
            text-decoration: none;
            margin-right: 2rem;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            transition: all 0.3s;
            display: inline-block;
        }
        .navbar nav a:hover { background: rgba(196, 206, 212, 0.2); color: #fff; }
        .navbar nav a.back-btn { background: rgba(196, 206, 212, 0.2); }

        .navbar .team-logo {
            width: 35px;
            height: 35px;
            background-image: url('/nbalogo/NBA.svg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 120px 30px 30px; 
            text-align: center;
        }

        .not-found-icon {
            font-size: 8rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .not-found-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #C4CED4;
            margin-bottom: 20px;
        }

        .not-found-message {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
        }

        .player-id {
            background: rgba(196, 206, 212, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            font-family: monospace;
            color: #4cc9f0;
            margin-bottom: 30px;
        }

        .suggestions {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            text-align: left;
            margin-bottom: 30px;
        }

        .suggestions h3 {
            color: #4cc9f0;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .suggestions ul {
            list-style: none;
            padding: 0;
        }

        .suggestions li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(196, 206, 212, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestions li:last-child {
            border-bottom: none;
        }

        .suggestions li::before {
            content: '💡';
            font-size: 1.2rem;
        }

        .search-section {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .search-section h3 {
            color: #C4CED4;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }

        .search-box input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(196, 206, 212, 0.3);
            background: rgba(0,0,0,0.5);
            color: #C4CED4;
            font-size: 1rem;
        }

        .search-box button {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #0b3d91, #1e4daf);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(11, 61, 145, 0.4);
        }

        .quick-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-link {
            padding: 12px 24px;
            background: rgba(76, 201, 240, 0.1);
            border: 1px solid rgba(76, 201, 240, 0.3);
            border-radius: 25px;
            color: #4cc9f0;
            text-decoration: none;
            transition: all 0.3s;
        }

        .quick-link:hover {
            background: rgba(76, 201, 240, 0.2);
            transform: translateY(-2px);
        }

        .popular-players {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
        }

        .popular-players h3 {
            color: #C4CED4;
            margin-bottom: 20px;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .player-card {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .player-card:hover {
            background: rgba(76, 201, 240, 0.2);
            transform: translateY(-3px);
        }

        .player-initial {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0b3d91, #1e4daf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 auto 10px;
            text-transform: uppercase;
        }

        .player-name {
            font-weight: 600;
            color: #C4CED4;
            margin-bottom: 5px;
        }

        .player-position {
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>
            <span class="team-logo"></span>
            <span>NBA球员详情</span>
        </h1>
        <nav>
            <a href="/" class="back-btn">← 返回首页</a>
            <a href="/player-career">球员生涯</a>
            <a href="/player-compare">球员对比</a>
        </nav>
    </nav>

    <div class="container">
        <div class="not-found-icon">🔍</div>
        <div class="not-found-title">球员未找到</div>
        <div class="not-found-message">抱歉，未找到ID为 <span class="player-id">{{ player_id }}</span> 的球员</div>

        <div class="suggestions">
            <h3>可能的原因：</h3>
            <ul>
                <li>球员ID输入错误</li>
                <li>该球员尚未收录</li>
                <li>球员姓名拼写有误</li>
            </ul>
        </div>

        <div class="search-section">
            <h3>搜索球员</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入球员姓名搜索...">
                <button onclick="searchPlayer()">搜索</button>
            </div>
        </div>

        <div class="popular-players">
            <h3>热门球员</h3>
            <div class="player-grid">
                <div class="player-card" onclick="goToPlayer('wembanyama')">
                    <div class="player-initial">VW</div>
                    <div class="player-name">Victor Wembanyama</div>
                    <div class="player-position">中锋</div>
                </div>
                <div class="player-card" onclick="goToPlayer('lebron')">
                    <div class="player-initial">LJ</div>
                    <div class="player-name">LeBron James</div>
                    <div class="player-position">前锋</div>
                </div>
                <div class="player-card" onclick="goToPlayer('curry')">
                    <div class="player-initial">SC</div>
                    <div class="player-name">Stephen Curry</div>
                    <div class="player-position">后卫</div>
                </div>
                <div class="player-card" onclick="goToPlayer('jokic')">
                    <div class="player-initial">NJ</div>
                    <div class="player-name">Nikola Jokic</div>
                    <div class="player-position">中锋</div>
                </div>
                <div class="player-card" onclick="goToPlayer('giannis')">
                    <div class="player-initial">GA</div>
                    <div class="player-name">Giannis Antetokounmpo</div>
                    <div class="player-position">前锋</div>
                </div>
                <div class="player-card" onclick="goToPlayer('durant')">
                    <div class="player-initial">KD</div>
                    <div class="player-name">Kevin Durant</div>
                    <div class="player-position">前锋</div>
                </div>
            </div>
        </div>

        <div class="quick-links">
            <a href="/" class="quick-link">🏠 返回首页</a>
            <a href="/player-career" class="quick-link">📈 球员生涯</a>
            <a href="/player-compare" class="quick-link">⚔️ 球员对比</a>
        </div>
    </div>

    <script>
        function searchPlayer() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.location.href = `/player/search?q=${encodeURIComponent(query)}`;
            }
        }

        function goToPlayer(playerId) {
            window.location.href = `/player/${playerId}`;
        }

        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchPlayer();
            }
        });
    </script>
</body>
</html>
