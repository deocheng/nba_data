<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀 {{ player_name }} 投篮热区</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #feca57; font-size: 2rem; }
        
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .nav-links a { color: #fff; text-decoration: none; padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        .nav-links a:hover { background: #feca57; color: #1a1a2e; }
        
        .stats-bar { display: flex; justify-content: center; gap: 50px; margin-bottom: 30px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; color: #feca57; font-weight: bold; }
        .stat-label { color: #aaa; font-size: 0.9rem; }
        
        .court-container { position: relative; width: 910px; height: 855px; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        
        .court-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 不翻转，保持原样 */
        }
        
        .shot-point {
            position: absolute;
            border-radius: 50%;
            z-index: 10;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.8;
        }
        
        .shot-point:hover {
            opacity: 1;
            transform: translate(-50%, -50%) scale(2);
            z-index: 20;
        }
        
        .shot-made { background: rgba(46, 213, 115, 0.9); border: 1px solid #2ed573; }
        .shot-missed { background: rgba(255, 107, 107, 0.7); border: 1px solid #ff6b6b; }
        
        .zone-stats { display: flex; justify-content: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
        .zone-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; min-width: 150px; }
        .zone-name { color: #feca57; font-weight: bold; font-size: 1.1rem; }
        .zone-pct { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        
        .legend { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.made { background: #2ed573; }
        .legend-dot.missed { background: #ff6b6b; }
        
        .tooltip { position: fixed; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 5px; font-size: 0.8rem; pointer-events: none; z-index: 100; display: none; }
        
        .view-toggle { text-align: center; margin-bottom: 20px; }
        .view-toggle button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .view-toggle button.active { background: #feca57; color: #1a1a2e; }
        .view-toggle button:hover { background: rgba(255,255,255,0.2); }
        
        .heatmap-cell {
            position: absolute;
            border-radius: 3px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .heatmap-cell:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏀 {{ player_name }} 投篮热区</h1>
        </header>
        
        <div class="nav-links">
            <a href="/">📊 仪表盘</a>
            <a href="/players">🎯 球员列表</a>
            <a href="/games">⚽ 比赛列表</a>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value">{{ total_shots }}</div>
                <div class="stat-label">总出手</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{ made_count }}</div>
                <div class="stat-label">命中</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{ fg_pct }}%</div>
                <div class="stat-label">命中率</div>
            </div>
        </div>
        
        <div class="view-toggle">
            <button id="view-scatter" class="active">散点图</button>
            <button id="view-heatmap">热图</button>
        </div>
        
        <div class="court-container" id="court-container">
            <img src="/static/court-nba-bbr.svg" class="court-img" />
            <div id="shot-points"></div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-dot made"></div><span>命中 (绿色)</span></div>
            <div class="legend-item"><div class="legend-dot missed"></div><span>未命中 (红色)</span></div>
        </div>
        
        <div class="zone-stats">
            {% for zone in zone_stats %}
            <div class="zone-card">
                <div class="zone-name">{{ zone.name }}</div>
                <div class="zone-pct">{{ zone.pct }}%</div>
                <div style="color: #aaa;">{{ zone.made }}/{{ zone.att }}次</div>
            </div>
            {% endfor %}
        </div>
        
        <div class="tooltip" id="tooltip"></div>
    </div>
    
    <script>
        const shots = {{ shots|safe }};
        const container = document.getElementById('court-container');
        const shotContainer = document.getElementById('shot-points');
        const tooltip = document.getElementById('tooltip');
        const scatterBtn = document.getElementById('view-scatter');
        const heatmapBtn = document.getElementById('view-heatmap');
        
        // BBR半场图尺寸: 910 x 855
        // BBR坐标系:
        // x: -250 到 250 (左侧-250, 右侧250, 中间0)
        // y: 0 到 470 (底部0, 顶部470)
        // 图片坐标:
        // x: 0 到 910
        // y: 0 (顶部) 到 855 (底部)
        
        function convertCoordinates(shot) {
            // 背景图不翻转，但热点图Y轴取反翻转显示
            // 图片坐标系: y=0顶部(篮筐), y=855底部(中场)
            // BBR坐标系: y=0篮筐, y=470中场
            
            let x = (shot.x + 250) * (910 / 500);
            let y = shot.y * (855 / 470);  // 热点图翻转
            
            return { x, y };
        }
        
        function createScatterView() {
            shotContainer.innerHTML = '';
            
            shots.forEach(shot => {
                const pos = convertCoordinates(shot);
                
                // 检查坐标是否在图片范围内
                if (pos.x < 0 || pos.x > 910 || pos.y < 0 || pos.y > 855) {
                    return;
                }
                
                const point = document.createElement('div');
                point.className = 'shot-point ' + (shot.made ? 'shot-made' : 'shot-missed');
                
                // 根据距离调整大小
                const size = Math.max(4, Math.min(8, 10 - shot.dist / 20));
                point.style.width = size + 'px';
                point.style.height = size + 'px';
                point.style.left = pos.x + 'px';
                point.style.top = pos.y + 'px';
                
                point.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.innerHTML = `
                        <div>距离: ${shot.dist}英尺</div>
                        <div>结果: ${shot.made ? '命中' : '未命中'}</div>
                        <div>赛季: ${shot.season}</div>
                    `;
                    tooltip.style.left = e.clientX + 10 + 'px';
                    tooltip.style.top = e.clientY + 10 + 'px';
                });
                
                point.addEventListener('mousemove', (e) => {
                    tooltip.style.left = e.clientX + 10 + 'px';
                    tooltip.style.top = e.clientY + 10 + 'px';
                });
                
                point.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
                
                shotContainer.appendChild(point);
            });
        }
        
        function createHeatmapView() {
            shotContainer.innerHTML = '';
            
            const gridSize = 15;
            const grid = {};
            const madeGrid = {};
            
            shots.forEach(shot => {
                const pos = convertCoordinates(shot);
                
                if (pos.x < 0 || pos.x > 910 || pos.y < 0 || pos.y > 855) {
                    return;
                }
                
                const gridX = Math.floor(pos.x / gridSize);
                const gridY = Math.floor(pos.y / gridSize);
                const key = gridX + ',' + gridY;
                
                grid[key] = (grid[key] || 0) + 1;
                if (shot.made) {
                    madeGrid[key] = (madeGrid[key] || 0) + 1;
                }
            });
            
            const maxCount = Math.max(...Object.values(grid), 1);
            
            Object.entries(grid).forEach(([key, count]) => {
                const [gridX, gridY] = key.split(',').map(Number);
                const made = madeGrid[key] || 0;
                const pct = made / count * 100;
                
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                cell.style.width = gridSize - 1 + 'px';
                cell.style.height = gridSize - 1 + 'px';
                cell.style.left = gridX * gridSize + 'px';
                cell.style.top = gridY * gridSize + 'px';
                
                const intensity = count / maxCount;
                if (pct >= 50) {
                    cell.style.background = `rgba(46, 213, 115, ${0.3 + intensity * 0.5})`;
                } else if (pct >= 30) {
                    cell.style.background = `rgba(254, 202, 87, ${0.3 + intensity * 0.5})`;
                } else {
                    cell.style.background = `rgba(255, 107, 107, ${0.3 + intensity * 0.5})`;
                }
                
                cell.addEventListener('mouseenter', (e) => {
                    tooltip.style.display = 'block';
                    tooltip.innerHTML = `
                        <div>投篮: ${count}次</div>
                        <div>命中: ${made}次 (${pct.toFixed(1)}%)</div>
                    `;
                    tooltip.style.left = e.clientX + 10 + 'px';
                    tooltip.style.top = e.clientY + 10 + 'px';
                });
                
                cell.addEventListener('mouseleave', () => {
                    tooltip.style.display = 'none';
                });
                
                shotContainer.appendChild(cell);
            });
        }
        
        createScatterView();
        
        scatterBtn.addEventListener('click', () => {
            scatterBtn.classList.add('active');
            heatmapBtn.classList.remove('active');
            createScatterView();
        });
        
        heatmapBtn.addEventListener('click', () => {
            heatmapBtn.classList.add('active');
            scatterBtn.classList.remove('active');
            createHeatmapView();
        });
    </script>
</body>
</html>
